port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false
keep-alive-interval: 15
keep-alive-idle: 300
unified-delay: true
tcp-concurrent: true
external-controller: '127.0.0.1:9090'
profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.jsdelivr.net"
    - "gh-proxy.*"
    - "ghproxy.*"
    - "gh.api.*.*"
    - "connectivitycheck.platform.hicloud.com" # 华为
    - "captive.apple.com" # 苹果
    - "dns.alidns.com"
    - "doh.pub"
    - "dns.google"
    - "cloudflare-dns.com"
    - "dns.adguard.com"
    - "rule-set:fakeipfilter"
    - "rule-set:private"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "rule-set:gamecn": [223.5.5.5, 119.29.29.29]
    "rule-set:directdm": [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
  direct-nameserver-follow-policy: true
  direct-nameserver:
    - system
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
hosts:
  mtalk.google.com: [142.250.107.188, 108.177.125.188]

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "*.push.apple.com"
    - "+.apple.com"
    - "*.wechat.com"
    - "*.qpic.cn"
    - "*.qq.com"
    - "*.wechatapp.com"
    - "*.vivox.com"

filterHK: &filterHK "^(?=.*(?i)(港|hk|hong|HKG|🇭🇰)).*$"
filterJP: &filterJP "^(?=.*(?i)(日本|jp|japan|东京|tokyo|osaka|NRT|HND|KIX|CTS|FUK|🇯🇵)).*$"
filterTW: &filterTW "^(?=.*(?i)(台|tw|taiwan|🇹🇼)).*$"
filterSG: &filterSG "^(?=.*(?i)(加坡|狮|sg|singapore|SIN|🇸🇬)).*$"
filterKR: &filterKR "^(?=.*(?i)(韩|kr|korea|首尔|seoul|ICN|🇰🇷)).*$"
filterUS: &filterUS "^(?=.*(?i)(美|us|unitedstates|united state|americ|洛杉|los |lax|纽约|ny|🇺🇸)).*$"
filterLOGO: &filterLOGO "^(?=.*(?i)(订阅|剩余|重置|到期|加入|机场|官网|地址|过期|群|邀请|返利|邮箱|xpire|raffic|websi|use|tota|email|e-mail|author)).*$"
filterETC: &filterETC "^(?!.*(港|hk|hong|HKG|🇭🇰|日本|jp|japan|东京|tokyo|ty|osaka|NRT|HND|KIX|CTS|FUK|🇯🇵|台|tw|taiwan|tp|🇹🇼|加坡|狮|sg|singapore|SIN|🇸🇬|韩|kr|korea|首尔|seoul|ICN|🇰🇷|美|us|unitedstates|united state|americ|洛杉|los |lax|纽约|ny|🇺🇸|订阅|剩余|重置|到期|加入|机场|官网|地址|过期|群|邀请|返利|邮箱|xpire|raffic|websi|use|tota|email|e-mail|author)).*$"
filterASIA: &filterASIA "^(?=.*(?i)(港|hk|hong|HKG|🇭🇰|日本|jp|japan|东京|tokyo|ty|osaka|NRT|HND|KIX|CTS|FUK|🇯🇵|台|tw|taiwan|tp|🇹🇼|加坡|狮|sg|singapore|SIN|🇸🇬|韩|kr|korea|首尔|seoul|ICN|🇰🇷)).*$"
filterSPC: &filterSPC "^(?=.*(?i)(港|hk|hong|HKG|🇭🇰|日本|jp|japan|东京|tokyo|ty|osaka|NRT|HND|KIX|CTS|FUK|🇯🇵|台|tw|taiwan|tp|🇹🇼|加坡|狮|sg|singapore|SIN|🇸🇬|韩|kr|korea|首尔|seoul|ICN|🇰🇷|美|us|unitedstates|united state|americ|洛杉|los |lax|纽约|ny|🇺🇸)).*$"
groupprop: &groupprop
  type: select
  lazy: true
  interval: 300
  url: "https://www.gstatic.com/generate_204"
  timeout: 3000
  max-failed-times: 5
  include-all-providers: true
  include-all-proxies: true
proxy-groups:
  - name: 🌏默认代理
    type: select
    proxies:
      - 自动转移
      - 🇭🇰香港
      - 🇯🇵日本
      - 🇹🇼台湾
      - 🇸🇬新加坡
      - 🇰🇷韩国
      - 🇺🇸美国
      - 🌐其他
      - DIRECT
  - {name: "🇭🇰香港", <<: *groupprop, filter: *filterHK}
  - {name: "🇯🇵日本", <<: *groupprop, filter: *filterJP}
  - {name: "🇹🇼台湾", <<: *groupprop, filter: *filterTW}
  - {name: "🇸🇬新加坡", <<: *groupprop, filter: *filterSG}
  - {name: "🇰🇷韩国", <<: *groupprop, filter: *filterKR}
  - {name: "🇺🇸美国", <<: *groupprop, filter: *filterUS}
  - {name: "🌐其他", <<: *groupprop, filter: *filterETC}
  - {name: "🚩信息", <<: *groupprop, filter: *filterLOGO}
  - {name: "自动转移", type: select, proxies: ["香港", "日本", "新加坡", "美国"]}
  - {name: "香港", <<: *groupprop, type: url-test, filter: *filterHK, hidden: true}
  - {name: "日本", <<: *groupprop, type: url-test, filter: *filterJP, hidden: true}
  - {name: "新加坡", <<: *groupprop, type: url-test, filter: *filterSG, hidden: true}
  - {name: "美国", <<: *groupprop, type: url-test, filter: *filterUS, hidden: true}
  - {name: "⚓稳定IP", type: select, proxies: ["🇭🇰香港", "🇯🇵日本", "🇹🇼台湾", "🇸🇬新加坡", "🇰🇷韩国", "🇺🇸美国"], include-all-providers: true, include-all-proxies: true, filter: *filterSPC}
  - {name: "🎮游戏线路", type: select, proxies: ["🇹🇼台湾", "🇭🇰香港", "🇯🇵日本", "🇰🇷韩国", DIRECT], include-all-providers: true, include-all-proxies: true, filter: *filterASIA}
  - {name: "🎬影视线路", type: select, proxies: [DIRECT, "🌏默认代理"], include-all-providers: true, include-all-proxies: true, filter: *filterASIA}
  - {name: "✨Ai线路", type: select, proxies: ["🇯🇵日本", "🇹🇼台湾", "🇸🇬新加坡", "🇺🇸美国", "🌐其他"]}
  - {name: "MS+Bing", type: select, proxies: ["🇭🇰香港", "🇯🇵日本", "🇹🇼台湾", "🇸🇬新加坡", "🇺🇸美国", "🌏默认代理", "🌐其他"]}
  - {name: "OneDrive", type: select, proxies: [DIRECT, "MS+Bing", "🌏默认代理"]}
  - {name: "Google", type: select, proxies: ["🇯🇵日本", "🇭🇰香港", "🇸🇬新加坡", "🇺🇸美国", "🇹🇼台湾", "🇰🇷韩国", "🌏默认代理", "🌐其他"]}
  - {name: "FCM通知", type: select, proxies: [DIRECT, "Google"]}
  - {name: "Apple", type: select, proxies: [DIRECT, "🇯🇵日本", "🇭🇰香港", "🇸🇬新加坡", "🇺🇸美国", "🇹🇼台湾", "🇰🇷韩国", "🌏默认代理", "🌐其他"]}
  - {name: "外国媒体", type: select, proxies: ["⚓稳定IP", "🌏默认代理"]}
  - {name: "🔎未命中", type: select, proxies: ["🌏默认代理", DIRECT]}
  - {name: "🛑广告拦截", type: select, proxies: [REJECT, PASS]}
  - {name: "国外QUIC", type: select, proxies: [REJECT, PASS]}

mrsdm: &mrsdm
  type: http
  behavior: domain
  format: mrs
  interval: 86400
mrsip: &mrsip
  type: http
  behavior: ipcidr
  format: mrs
  interval: 86400
yaml: &yaml
  type: http
  behavior: domain
  interval: 86400
txt: &txt
  type: http
  format: text
  interval: 86400
rule-providers:
  fakeipfilter:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/fakeip-filter.mrs"
    path: ./ruleset/fakeipfilter.mrs
  private:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/private.mrs"
    path: ./ruleset/private.mrs
  privateip:
    <<: *mrsip
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/privateip.mrs"
    path: ./ruleset/privateip.mrs
  gamecn:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/games-cn.mrs"
    path: ./ruleset/gamecn.mrs
  cusdirect:
    <<: *yaml
    url: "https://cdn.jsdelivr.net/gh/JesterW365/Custom_Rulesets@main/Generated_Rulesets/mihomo/direct_domain.yaml"
    path: ./ruleset/cusdirect.yaml
  trackerlist:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/trackerslist.mrs"
    path: ./ruleset/trackerlist.mrs

  # 广告拦截
  adrulestop:
    <<: *mrsdm
    url: "https://adrules.top/adrules-mihomo.mrs"
    path: ./ruleset/adrulestop.mrs
  antiad:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ads.mrs"
    path: ./ruleset/antiad.mrs
  mobileads:
    <<: *yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/JesterW365/Custom_Rulesets@main/Generated_Rulesets/mihomo/mobile_ads.yaml"
    path: ./ruleset/mobileads.yaml
  rejectip:
    <<: *txt
    behavior: classical
    url: "https://ruleset.skk.moe/Clash/ip/reject.txt"
    path: ./ruleset/rejectip.txt

# 微软和Bing
  msbing:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/HenryChiao/MIHOMO_YAMLS@ruleset/meta/domain/microsoft.mrs"
    path: ./ruleset/msbing.mrs
# 微软cdn
  mscdn:
    <<: *txt
    behavior: domain
    url: "https://ruleset.skk.moe/Clash/non_ip/microsoft_cdn.txt"
    path: ./ruleset/mscdn.txt
# OneDrive
  onedrive:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/HenryChiao/MIHOMO_YAMLS@ruleset/meta/domain/onedrive.mrs"
    path: ./ruleset/onedrive.mrs

# 谷歌
  google:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/HenryChiao/MIHOMO_YAMLS@ruleset/meta/domain/google.mrs"
    path: ./ruleset/google.mrs
# FCM
  fcm:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/HenryChiao/MIHOMO_YAMLS@ruleset/meta/domain/googlefcm.mrs"
    path: ./ruleset/fcm.mrs
# Youtube
  youtube:
