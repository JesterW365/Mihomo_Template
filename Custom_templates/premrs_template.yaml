    path: ./ruleset/youtube.mrs

# 苹果和iCloud
  apple:
    <<: *yaml
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/JesterW365/Clash_Rulesets_Template@master/Generated_rulesets/appleicloud.yaml"
    path: ./ruleset/appleicloud.yaml

# 外国Ai服务
  aiservice:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ai.mrs"
    path: ./ruleset/aiservice.mrs

# 国内Ai服务
  gamesuncn:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/games.mrs"
    path: ./ruleset/gamesuncn.mrs

# 外国社交媒体
  fixedmedias1:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-social-media-!cn.mrs"
