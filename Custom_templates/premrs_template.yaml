  fixedmedias2:
    <<: *mrsdm
    url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-communication.mrs"
    path: ./ruleset/fixedmedias2.mrs

# TelegramIP
  telegramip:
    <<: *mrsip
    url: "https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/telegramip.mrs"
    path: ./ruleset/telegramip.mrs

# 直连域名和IP
  directdm:
    <<: *mrsdm
    url: "https://gh-proxy.org/https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/cn.mrs"
    path: ./ruleset/cndm.mrs
  directip:
    <<: *mrsip
    url: "https://gh-proxy.org/https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/cnip.mrs"
    path: ./ruleset/cnip.mrs

# 代理域名
  proxy:
    <<: *mrsdm
    url: "https://gh-proxy.org/https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/proxy.mrs"
    path: ./ruleset/proxy.mrs

# 分流规则

rules:
  - DOMAIN-SUFFIX,netloading.net,DIRECT
  - DOMAIN-SUFFIX,yunti.online,🎬影视线路
  - DOMAIN-SUFFIX,mjji.de,🎬影视线路
  - RULE-SET,private,DIRECT
  - RULE-SET,gamecn,DIRECT
  - RULE-SET,trackerlist,DIRECT
  - RULE-SET,cusdirect,DIRECT
  - RULE-SET,adrulestop,🛑广告拦截
  - RULE-SET,antiad,🛑广告拦截
  - RULE-SET,mobileads,🛑广告拦截
  - RULE-SET,gamesuncn,🎮游戏线路
  - RULE-SET,mscdn,DIRECT
  - RULE-SET,onedrive,OneDrive
  - RULE-SET,msbing,MS+Bing
  - RULE-SET,fcm,FCM通知
  - RULE-SET,google,Google
  - RULE-SET,youtube,Google
  - RULE-SET,apple,Apple
  - RULE-SET,aiservice,✨Ai线路
  - GEOSITE,category-ai-cn,DIRECT
  - RULE-SET,fixedmedias1,外国媒体
  - RULE-SET,fixedmedias2,外国媒体
  - RULE-SET,telegramip,外国媒体,no-resolve
  - RULE-SET,proxy,🌏默认代理
  - RULE-SET,directdm,DIRECT
  - RULE-SET,directip,DIRECT
  - RULE-SET,privateip,DIRECT,no-resolve
  - RULE-SET,rejectip,🛑广告拦截
  - MATCH,🔎未命中
