dmdnsCN: &dmdnsCN [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
ipdnsCN: &ipdnsCN [223.5.5.5, 119.29.29.29, 1.1.1.1]
# dmdnsunCN: &dmdnsunCN [https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24]
dmdnsunCN: &dmdnsunCN [https://8.8.8.8/dns-query, https://cloudflare-dns.com/dns-query#h3=true]
# ipdnsunCN: &ipdnsunCN [1.1.1.1, 8.8.8.8]

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.msftconnecttest.com
    - +.msftncsi.com
    - "rule-set:connectable"
    - "rule-set:fakeipfilter"
    - "rule-set:private"
    - "rule-set:trackerlist"
    - "rule-set:cusdirect"
    - "rule-set:aiservicecn"
    - "rule-set:directdm"
  default-nameserver: *ipdnsCN
  proxy-server-nameserver: *dmdnsCN
  nameserver-policy:
    "rule-set:gamecn": *ipdnsCN
    "rule-set:directdm": *dmdnsCN
  direct-nameserver-follow-policy: true
  direct-nameserver: *dmdnsCN
  nameserver: *dmdnsunCN
